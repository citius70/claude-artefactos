<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polea móvil</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      background: #fff;
      color: #222;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 360px;
      margin-bottom: 12px;
    }
    .controls label {
      font-size: 15px;
      font-weight: 600;
      color: #7a1a1a;
      min-width: 30px;
    }
    .controls input[type=range] {
      flex: 1;
      accent-color: #7a1a1a;
    }
    .controls span {
      font-size: 15px;
      font-weight: 600;
      color: #7a1a1a;
      min-width: 60px;
    }
    svg {
      max-width: 560px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="controls">
    <label>R</label>
    <input type="range" id="slider" min="10" max="500" value="200" step="10">
    <span id="rval">200 N</span>
  </div>

  <svg viewBox="0 0 680 800" role="img" xmlns="http://www.w3.org/2000/svg">
    <title>Polea móvil con polea fija</title>
    <defs>
      <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#7a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <linearGradient id="ruedaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#d0d0d0"/>
        <stop offset="50%"  stop-color="#909090"/>
        <stop offset="100%" stop-color="#505050"/>
      </linearGradient>
      <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="#aaaaaa"/>
        <stop offset="50%"  stop-color="#e0e0e0"/>
        <stop offset="100%" stop-color="#888888"/>
      </linearGradient>
      <linearGradient id="bloqueGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#c0392b"/>
        <stop offset="100%" stop-color="#6b1010"/>
      </linearGradient>
    </defs>

    <!-- TECHO -->
    <rect x="180" y="28" width="320" height="13" rx="2" fill="#777" stroke="#555" stroke-width="1"/>
    <line x1="184" y1="28" x2="172" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="197" y1="28" x2="185" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="210" y1="28" x2="198" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="223" y1="28" x2="211" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="236" y1="28" x2="224" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="249" y1="28" x2="237" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="262" y1="28" x2="250" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="275" y1="28" x2="263" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="288" y1="28" x2="276" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="301" y1="28" x2="289" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="314" y1="28" x2="302" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="327" y1="28" x2="315" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="340" y1="28" x2="328" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="353" y1="28" x2="341" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="366" y1="28" x2="354" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="379" y1="28" x2="367" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="392" y1="28" x2="380" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="405" y1="28" x2="393" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="418" y1="28" x2="406" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="431" y1="28" x2="419" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="444" y1="28" x2="432" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="457" y1="28" x2="445" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="492" y1="28" x2="480" y2="16" stroke="#555" stroke-width="1.2" opacity="0.5"/>

    <!-- Anclaje cuerda izquierda al techo -->
    <rect x="245" y="33" width="10" height="12" rx="2" fill="url(#metalGrad)" stroke="#777" stroke-width="0.8"/>

    <!-- CUERDAS -->
    <!-- Segmento 1: vertical izq x=250, desde techo hasta tangente izq polea móvil -->
    <rect x="246" y="41" width="8" height="349" rx="4" fill="#a07830"/>
    <rect x="247" y="41" width="3" height="349" rx="2" fill="#d4a94a" opacity="0.5"/>
    <!-- Segmento 2: diagonal desde tang. der polea móvil hasta tang. izq polea fija -->
    <line x1="310" y1="390" x2="370" y2="110" stroke="#a07830" stroke-width="8" stroke-linecap="round"/>
    <line x1="310" y1="390" x2="370" y2="110" stroke="#d4a94a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <!-- Segmento 3: vertical der x=430, desde tang. der polea fija hacia abajo -->
    <rect x="426" y="110" width="8" height="330" rx="4" fill="#a07830"/>
    <rect x="427" y="110" width="3" height="330" rx="2" fill="#d4a94a" opacity="0.5"/>

    <!-- POLEA MÓVIL cx=280 cy=390 r=40 -->
    <circle cx="280" cy="390" r="40" fill="url(#ruedaGrad)" stroke="#444" stroke-width="2"/>
    <circle cx="280" cy="390" r="30" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="280" cy="390" r="30" fill="none" stroke="#999" stroke-width="2"/>
    <line x1="280" y1="350" x2="280" y2="430" stroke="#666" stroke-width="2"/>
    <line x1="240" y1="390" x2="320" y2="390" stroke="#666" stroke-width="2"/>
    <line x1="252" y1="362" x2="308" y2="418" stroke="#666" stroke-width="1.5"/>
    <line x1="308" y1="362" x2="252" y2="418" stroke="#666" stroke-width="1.5"/>
    <circle cx="280" cy="390" r="12" fill="#ccc" stroke="#555" stroke-width="1.5"/>
    <circle cx="280" cy="390" r="5"  fill="#666" stroke="#444" stroke-width="1"/>
    <circle cx="280" cy="390" r="2.5" fill="#999"/>
    <!-- Vástago eje → bloque -->
    <rect x="276" y="430" width="8" height="20" rx="2" fill="url(#metalGrad)" stroke="#777" stroke-width="0.8"/>

    <!-- BLOQUE MASA -->
    <rect x="240" y="450" width="80" height="60" rx="8" fill="url(#bloqueGrad)" stroke="#7a1a1a" stroke-width="2"/>
    <circle cx="254" cy="463" r="4" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.7"/>
    <circle cx="306" cy="463" r="4" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.7"/>
    <circle cx="254" cy="497" r="4" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.7"/>
    <circle cx="306" cy="497" r="4" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.7"/>

    <!-- Flecha R: 160 px (doble que F) -->
    <line x1="280" y1="510" x2="280" y2="670" stroke="#7a1a1a" stroke-width="3" marker-end="url(#arr-red)"/>
    <text id="labelR" x="270" y="598" text-anchor="end"
          font-family="sans-serif" font-size="17" font-weight="600" fill="#7a1a1a">R = 200 N</text>

    <!-- POLEA FIJA cx=400 cy=110 r=40 -->
    <rect x="396" y="33" width="8" height="37" rx="3" fill="url(#metalGrad)" stroke="#777" stroke-width="1"/>
    <circle cx="400" cy="110" r="40" fill="url(#ruedaGrad)" stroke="#444" stroke-width="2"/>
    <circle cx="400" cy="110" r="30" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="400" cy="110" r="30" fill="none" stroke="#999" stroke-width="2"/>
    <line x1="400" y1="70"  x2="400" y2="150" stroke="#666" stroke-width="2"/>
    <line x1="360" y1="110" x2="440" y2="110" stroke="#666" stroke-width="2"/>
    <line x1="372" y1="82"  x2="428" y2="138" stroke="#666" stroke-width="1.5"/>
    <line x1="428" y1="82"  x2="372" y2="138" stroke="#666" stroke-width="1.5"/>
    <circle cx="400" cy="110" r="12" fill="#ccc" stroke="#555" stroke-width="1.5"/>
    <circle cx="400" cy="110" r="5"  fill="#666" stroke="#444" stroke-width="1"/>
    <circle cx="400" cy="110" r="2.5" fill="#999"/>

    <!-- Flecha F: 80 px -->
    <line x1="430" y1="440" x2="430" y2="520" stroke="#185FA5" stroke-width="3" marker-end="url(#arr-blue)"/>
    <text id="labelF" x="448" y="487"
          font-family="sans-serif" font-size="17" font-weight="600" fill="#185FA5">F = 100 N</text>

    <!-- PANEL FÓRMULAS -->
    <rect x="90" y="695" width="500" height="90" rx="10" fill="none" stroke="#ccc" stroke-width="1"/>

    <!-- F = -->
    <text x="148" y="738" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="500" fill="#185FA5">F</text>
    <text x="172" y="738" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="500" fill="#222">=</text>

    <!-- Fracción 1: R / 2 -->
    <text x="200" y="718" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="500" fill="#7a1a1a">R</text>
    <line x1="186" y1="727" x2="214" y2="727" stroke="#222" stroke-width="2"/>
    <text x="200" y="752" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="500" fill="#222">2</text>

    <!-- = -->
    <text x="236" y="738" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="400" fill="#666">=</text>

    <!-- Fracción 2: valor_R N / 2 (dinámica) -->
    <text id="rNum" x="278" y="718" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="500" fill="#7a1a1a">200 N</text>
    <line id="fracLine" x1="252" y1="727" x2="304" y2="727" stroke="#222" stroke-width="2"/>
    <text x="278" y="752" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="500" fill="#222">2</text>

    <!-- = resultado -->
    <text x="324" y="738" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="400" fill="#666">=</text>
    <text id="fNum" x="400" y="738" text-anchor="middle"
          font-family="sans-serif" font-size="22" font-weight="600" fill="#185FA5">100 N</text>
  </svg>

  <script>
    const slider   = document.getElementById('slider');
    const rval     = document.getElementById('rval');
    const labelR   = document.getElementById('labelR');
    const labelF   = document.getElementById('labelF');
    const rNum     = document.getElementById('rNum');
    const fNum     = document.getElementById('fNum');
    const fracLine = document.getElementById('fracLine');

    slider.addEventListener('input', () => {
      const R = parseInt(slider.value);
      const F = R / 2;
      rval.textContent   = R + ' N';
      labelR.textContent = 'R = ' + R + ' N';
      labelF.textContent = 'F = ' + F + ' N';
      rNum.textContent   = R + ' N';
      fNum.textContent   = F + ' N';
      // ajustar línea fracción según número de dígitos
      const half = R >= 100 ? 30 : R >= 10 ? 24 : 18;
      fracLine.setAttribute('x1', 278 - half);
      fracLine.setAttribute('x2', 278 + half);
    });
  </script>

</body>
</html>
