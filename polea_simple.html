<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polea simple</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      background: #fff;
      color: #222;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 340px;
      margin-bottom: 12px;
    }
    .controls label {
      font-size: 15px;
      font-weight: 600;
      color: #7a1a1a;
      min-width: 30px;
    }
    .controls input[type=range] {
      flex: 1;
      accent-color: #7a1a1a;
    }
    .controls span {
      font-size: 15px;
      font-weight: 600;
      color: #7a1a1a;
      min-width: 60px;
    }
    svg {
      max-width: 480px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="controls">
    <label>R</label>
    <input type="range" id="slider" min="10" max="500" value="100" step="10">
    <span id="rval">100 N</span>
  </div>

  <svg viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
    <title>Polea simple</title>
    <defs>
      <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#7a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <linearGradient id="ruedaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#d0d0d0"/>
        <stop offset="50%"  stop-color="#909090"/>
        <stop offset="100%" stop-color="#505050"/>
      </linearGradient>
      <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="#aaaaaa"/>
        <stop offset="50%"  stop-color="#e0e0e0"/>
        <stop offset="100%" stop-color="#888888"/>
      </linearGradient>
      <linearGradient id="bloqueGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#c0392b"/>
        <stop offset="100%" stop-color="#6b1010"/>
      </linearGradient>
    </defs>

    <!-- TECHO -->
    <rect x="296" y="20" width="88" height="13" rx="2" fill="#777" stroke="#555" stroke-width="1"/>
    <line x1="300" y1="20" x2="288" y2="8"  stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="313" y1="20" x2="301" y2="8"  stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="326" y1="20" x2="314" y2="8"  stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="339" y1="20" x2="327" y2="8"  stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="352" y1="20" x2="340" y2="8"  stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="365" y1="20" x2="353" y2="8"  stroke="#555" stroke-width="1.2" opacity="0.5"/>
    <line x1="378" y1="20" x2="366" y2="8"  stroke="#555" stroke-width="1.2" opacity="0.5"/>

    <!-- Vástago -->
    <rect x="335" y="33" width="10" height="30" rx="3" fill="url(#metalGrad)" stroke="#777" stroke-width="1"/>

    <!-- CUERDAS (detrás de la rueda) -->
    <rect x="302" y="105" width="8" height="243" rx="4" fill="#a07830"/>
    <rect x="303" y="105" width="3" height="243" rx="2" fill="#d4a94a" opacity="0.5"/>
    <rect x="370" y="105" width="8" height="223" rx="4" fill="#a07830"/>
    <rect x="371" y="105" width="3" height="223" rx="2" fill="#d4a94a" opacity="0.5"/>

    <!-- RUEDA METÁLICA -->
    <circle cx="340" cy="105" r="44" fill="url(#ruedaGrad)" stroke="#444" stroke-width="2"/>
    <circle cx="340" cy="105" r="34" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="340" cy="105" r="34" fill="none" stroke="#999" stroke-width="2"/>
    <line x1="340" y1="61"  x2="340" y2="149" stroke="#666" stroke-width="2"/>
    <line x1="296" y1="105" x2="384" y2="105" stroke="#666" stroke-width="2"/>
    <line x1="309" y1="74"  x2="371" y2="136" stroke="#666" stroke-width="1.5"/>
    <line x1="371" y1="74"  x2="309" y2="136" stroke="#666" stroke-width="1.5"/>
    <circle cx="340" cy="105" r="12" fill="#ccc" stroke="#555" stroke-width="1.5"/>
    <circle cx="340" cy="105" r="5"  fill="#666" stroke="#444" stroke-width="1"/>
    <circle cx="340" cy="105" r="2.5" fill="#999"/>

    <!-- BLOQUE MASA -->
    <rect x="262" y="348" width="88" height="64" rx="8" fill="url(#bloqueGrad)" stroke="#7a1a1a" stroke-width="2"/>
    <circle cx="276" cy="362" r="4" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.7"/>
    <circle cx="336" cy="362" r="4" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.7"/>
    <circle cx="276" cy="398" r="4" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.7"/>
    <circle cx="336" cy="398" r="4" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.7"/>

    <!-- Flecha R (granate) -->
    <line x1="306" y1="412" x2="306" y2="468" stroke="#7a1a1a" stroke-width="3" marker-end="url(#arr-red)"/>
    <text id="labelR" x="296" y="448" text-anchor="end"
          font-family="sans-serif" font-size="18" font-weight="600" fill="#7a1a1a">R = 100 N</text>

    <!-- Flecha F (azul) -->
    <line x1="374" y1="328" x2="374" y2="410" stroke="#185FA5" stroke-width="3" marker-end="url(#arr-blue)"/>
    <text x="392" y="375" font-family="sans-serif" font-size="22" font-weight="600" fill="#185FA5">F</text>

    <!-- PANEL FÓRMULAS -->
    <rect x="186" y="490" width="308" height="92" rx="10" fill="none" stroke="#ccc" stroke-width="1"/>
    <text x="326" y="520" text-anchor="end"    font-family="sans-serif" font-size="22" font-weight="500" fill="#185FA5">F</text>
    <text x="340" y="520" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="500" fill="#222">=</text>
    <text x="354" y="520" text-anchor="start"  font-family="sans-serif" font-size="22" font-weight="500" fill="#7a1a1a">R</text>
    <text x="326" y="564" text-anchor="end"    font-family="sans-serif" font-size="22" font-weight="500" fill="#185FA5">F</text>
    <text x="340" y="564" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="500" fill="#222">=</text>
    <text id="labelF" x="354" y="564" text-anchor="start" font-family="sans-serif" font-size="22" font-weight="900" fill="#185FA5">100 N</text>
  </svg>

  <script>
    const slider = document.getElementById('slider');
    const rval   = document.getElementById('rval');
    const labelR = document.getElementById('labelR');
    const labelF = document.getElementById('labelF');

    slider.addEventListener('input', () => {
      const v = slider.value;
      rval.textContent   = v + ' N';
      labelR.textContent = 'R = ' + v + ' N';
      labelF.textContent = v + ' N';
    });
  </script>

</body>
</html>
